{% extends "base.html" %}

{% block content %}

<h2>Select Event</h2>

<table class="table table-bordered">

<tr>
<th>Event Name</th>
<th>Date</th>
<th>View Attendance</th>
</tr>

{% for e in events %}

<tr>

<td>{{e.event_name}}</td>
<td>{{e.event_date}}</td>

<td>
<a href="/view_attendance/{{e.id}}" class="btn btn-info">
View
</a>
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
