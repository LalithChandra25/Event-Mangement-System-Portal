<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<title>CoreConnect</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo">
    <h2>CoreConnect</h2>
</div>

<nav class="navbar navbar-expand-lg">
<div class="container">

    <!-- BRAND -->
    {% if session.get('user') %}
        <a class="navbar-brand" href="/dashboard">CORE CONNECT</a>
    {% else %}
        <a class="navbar-brand" href="/login">CORE CONNECT</a>
    {% endif %}

    <div>

    {% if session.get('user') %}

        <!-- ✅ AFTER LOGIN -->
        <a href="/dashboard" class="btn btn-light btn-sm me-2">Dashboard</a>
        <a href="/events" class="btn btn-light btn-sm me-2">Events</a>
        <a href="/attendance_events" class="btn btn-light btn-sm me-2">Attendance</a>
        <a href="/gallery_events" class="btn btn-light btn-sm me-2">Gallery</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>

    {% else %}

        <!-- ❌ BEFORE LOGIN -->
        <a href="/login" class="btn btn-light btn-sm me-2">Login</a>
        <a href="/register" class="btn btn-light btn-sm">Register</a>

    {% endif %}

    </div>

</div>
</nav>

<!-- PAGE CONTENT -->
<div class="container">
{% block content %}
{% endblock %}
</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Core Connect | All Rights Reserved</p>
</footer>

</body>
</html>
